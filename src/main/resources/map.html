<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shoppe Driver Map</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css"/>
    <script src="vendor/leaflet/leaflet.js"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .route-label {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #d0d7de;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            color: #1f2937;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>
<div id="map"></div>

<script>
    let map;
    let shipperMarkers = {};
    let persistedOrderMarkers = {};
    let previewOrderMarkers = {};
    let routeLayers = [];
    let routeBadges = [];
    let endpointMarkers = [];
    let pendingData = null;
    let lastFitSignature = '';

    function initMap() {
        map = L.map('map', {
            zoomControl: true,
            preferCanvas: true
        }).setView([10.7769, 106.7009], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        if (pendingData) {
            updateMap(pendingData);
            pendingData = null;
        }
    }

    function updateMap(data) {
        if (!map) {
            pendingData = data;
            return;
        }

        const mapData = typeof data === 'string' ? JSON.parse(data) : data;

        updateShippers(mapData.shippers || []);
        updatePersistedOrders(mapData.orders || []);
        updatePreviewOrders(mapData.previewOrders || []);
        updatePreviewRoutes(mapData.previewRoutes || [], mapData.selectedRouteIndex || 0);
        fitMapToContentIfNeeded(mapData.previewRoutes || [], mapData.selectedRouteIndex || 0, mapData.previewOrders || []);
    }

    function createMarker(lat, lng, options) {
        return L.circleMarker([lat, lng], {
            radius: options.radius || 7,
            color: options.color,
            fillColor: options.fillColor || options.color,
            fillOpacity: 0.9,
            weight: options.weight || 2
        });
    }

    function syncMarkers(items, markerStore, markerFactory, tooltipFactory) {
        const activeIds = new Set();
        items.forEach(item => {
            const id = String(item.id);
            activeIds.add(id);
            if (markerStore[id]) {
                markerStore[id].setLatLng([item.lat, item.lng]);
            } else {
                markerStore[id] = markerFactory(item).addTo(map);
            }
            const tooltip = tooltipFactory(item);
            if (tooltip) {
                markerStore[id].bindTooltip(tooltip);
            }
        });

        Object.keys(markerStore).forEach(id => {
            if (!activeIds.has(id)) {
                map.removeLayer(markerStore[id]);
                delete markerStore[id];
            }
        });
    }

    function updateShippers(shippers) {
        syncMarkers(
            shippers,
            shipperMarkers,
            shipper => createMarker(shipper.lat, shipper.lng, {
                color: '#0f4c81',
                fillColor: '#1d70b8',
                radius: 8
            }),
            shipper => shipper.name + ' (' + shipper.status + ')'
        );
    }

    function updatePersistedOrders(orders) {
        syncMarkers(
            orders,
            persistedOrderMarkers,
            order => createMarker(order.lat, order.lng, {
                color: order.status === 'COMPLETED' ? '#2e7d32' : '#f57c00',
                fillColor: order.status === 'COMPLETED' ? '#4caf50' : '#ffb74d',
                radius: 6
            }),
            order => 'Order #' + order.id + ' - ' + order.status
        );
    }

    function updatePreviewOrders(orders) {
        syncMarkers(
            orders,
            previewOrderMarkers,
            order => createMarker(order.lat, order.lng, {
                color: '#7b1fa2',
                fillColor: '#ab47bc',
                radius: 7,
                weight: 3
            }),
            order => {
                const address = order.address && order.address.length > 0 ? '<br>' + order.address : '';
                return 'Preview Order #' + order.id + address;
            }
        );
    }

    function updatePreviewRoutes(routes, selectedRouteIndex) {
        routeLayers.forEach(layer => map.removeLayer(layer));
        routeBadges.forEach(layer => map.removeLayer(layer));
        endpointMarkers.forEach(marker => map.removeLayer(marker));
        routeLayers = [];
        routeBadges = [];
        endpointMarkers = [];

        if (!routes || routes.length === 0) {
            return;
        }

        routes.forEach(route => {
            const selected = route.index === selectedRouteIndex;
            const path = (route.polyline || []).map(point => [point.lat, point.lng]);
            if (path.length === 0) {
                return;
            }

            const polyline = L.polyline(path, {
                color: selected ? '#1565c0' : '#90caf9',
                weight: selected ? 6 : 4,
                opacity: selected ? 0.95 : 0.65
            }).addTo(map);
            routeLayers.push(polyline);

            const midpoint = path[Math.floor(path.length / 2)];
            const badge = L.marker(midpoint, {
                interactive: false,
                icon: L.divIcon({
                    className: 'route-label',
                    html: routeLabel(route),
                    iconSize: null
                })
            }).addTo(map);
            routeBadges.push(badge);

            if (selected) {
                if (route.waypoints && route.waypoints.length > 0) {
                    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                    route.waypoints.forEach((wp, wpIndex) => {
                        const letter = alphabet[wpIndex % alphabet.length];
                        let color = '#f39c12';
                        let fillColor = '#f1c40f';
                        let label = letter + ' - Waypoint';
                        if (wpIndex === 0) {
                            color = '#1b5e20';
                            fillColor = '#43a047';
                            label = letter + ' - Start';
                        } else if (wpIndex === route.waypoints.length - 1) {
                            color = '#b71c1c';
                            fillColor = '#e53935';
                            label = letter + ' - End';
                        }
                        
                        endpointMarkers.push(createMarker(wp.lat, wp.lng, {
                            color: color,
                            fillColor: fillColor,
                            radius: 9
                        }).addTo(map).bindTooltip(label));
                    });
                } else {
                    endpointMarkers.push(createMarker(route.fromLat, route.fromLng, {
                        color: '#1b5e20',
                        fillColor: '#43a047',
                        radius: 9
                    }).addTo(map).bindTooltip('A - Start'));

                    endpointMarkers.push(createMarker(route.toLat, route.toLng, {
                        color: '#b71c1c',
                        fillColor: '#e53935',
                        radius: 9
                    }).addTo(map).bindTooltip('B - End'));
                }
            }
        });
    }

    function routeLabel(route) {
        const km = (route.distanceMeters / 1000).toFixed(1);
        const min = Math.round(route.durationSeconds / 60);
        return 'Route ' + (route.index + 1) + ': ' + min + ' min - ' + km + ' km';
    }

    function fitMapToContentIfNeeded(routes, selectedRouteIndex, previewOrders) {
        if (!map) {
            return;
        }

        const fitSignature = buildFitSignature(routes, selectedRouteIndex, previewOrders);
        if (fitSignature === lastFitSignature) {
            return;
        }
        lastFitSignature = fitSignature;

        const layers = [];
        Object.values(shipperMarkers).forEach(marker => layers.push(marker));
        Object.values(previewOrderMarkers).forEach(marker => layers.push(marker));

        if (routeLayers.length > 0) {
            const selectedRoute = routeLayers.find((_, index) => routeLayers[index].options.color === '#1565c0') || routeLayers[0];
            map.fitBounds(selectedRoute.getBounds(), {padding: [28, 28]});
            return;
        }

        Object.values(persistedOrderMarkers).forEach(marker => layers.push(marker));
        if (layers.length === 0) {
            return;
        }

        const featureGroup = L.featureGroup(layers);
        map.fitBounds(featureGroup.getBounds(), {padding: [28, 28]});
    }

    function buildFitSignature(routes, selectedRouteIndex, previewOrders) {
        if (routes && routes.length > 0) {
            const selected = routes.find(route => route.index === selectedRouteIndex) || routes[0];
            const first = selected.polyline && selected.polyline.length > 0 ? selected.polyline[0] : null;
            const last = selected.polyline && selected.polyline.length > 0 ? selected.polyline[selected.polyline.length - 1] : null;
            return JSON.stringify({
                type: 'route',
                selectedRouteIndex: selectedRouteIndex,
                routeCount: routes.length,
                first: first,
                last: last,
                previewOrderIds: (previewOrders || []).map(order => order.id)
            });
        }

        if (previewOrders && previewOrders.length > 0) {
            return JSON.stringify({
                type: 'orders',
                ids: previewOrders.map(order => order.id)
            });
        }

        return JSON.stringify({
            type: 'base',
            shipperIds: Object.keys(shipperMarkers),
            orderIds: Object.keys(persistedOrderMarkers)
        });
    }

    window.updateMap = updateMap;
    window.addEventListener('load', initMap);
</script>
</body>
</html>
